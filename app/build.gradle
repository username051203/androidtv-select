plugins {
    id 'com.android.application'
}

android {
    namespace 'com.braviatv.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.braviatv.app"
        minSdk 21          // Android 5.0 — covers all Bravia Android TV models
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.leanback:leanback:1.0.0'   // Android TV Leanback UI
}
