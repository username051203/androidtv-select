name: Build Bravia YouTube TV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Also lets you trigger a build manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required for Android Gradle Plugin 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Make gradlew executable (it's committed without execute bit on Windows)
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # 4. Cache Gradle dependencies so subsequent builds are fast (~2 min → ~30 sec)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Build the debug APK
      - name: Build debug APK
        run: sudo apt-get update
             sudo apt-get install gradle
             gradlew assembleDebug --stacktrace

      # 6. Upload APK as a downloadable artifact
      #    Go to: Actions tab → your run → scroll down → Artifacts → download
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BraviaYouTubeTV-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 7. Print APK info for the build log
      - name: Show APK info
        run: |
          echo "=== Build complete ==="
          ls -lh app/build/outputs/apk/debug/
          echo "APK size: $(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
