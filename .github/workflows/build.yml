name: Build Bravia YouTube TV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: androidtv   # <-- project lives in this subdirectory

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Re-generate a valid gradle-wrapper.jar.
      # The committed jar is 21 bytes (corrupt/placeholder).
      # This step uses the Gradle binary matching gradle-wrapper.properties
      # to regenerate it in-place so every subsequent step works normally.
      - name: Fix gradle-wrapper.jar
        run: |
          GRADLE_VERSION=8.4
          GRADLE_ZIP="gradle-${GRADLE_VERSION}-bin.zip"
          GRADLE_URL="https://services.gradle.org/distributions/${GRADLE_ZIP}"
          echo "Downloading Gradle ${GRADLE_VERSION}..."
          curl -fsSL "$GRADLE_URL" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          GRADLE_BIN="/tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle"
          chmod +x "$GRADLE_BIN"
          echo "Regenerating gradle-wrapper.jar..."
          "$GRADLE_BIN" wrapper --gradle-version "$GRADLE_VERSION" --distribution-type bin
          JAR_SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          echo "gradle-wrapper.jar size: ${JAR_SIZE} bytes"
          if [ "$JAR_SIZE" -lt 50000 ]; then
            echo "ERROR: wrapper jar still too small (${JAR_SIZE} bytes)"
            exit 1
          fi
          echo "Wrapper jar OK"

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('androidtv/**/*.gradle*', 'androidtv/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BraviaYouTubeTV-debug
          path: androidtv/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== Build complete ==="
          ls -lh app/build/outputs/apk/debug/
          echo "APK size: $(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
